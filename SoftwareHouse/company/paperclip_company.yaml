company:
  name: SoftwareHouse
  display_name: Software House
  version: v8-paperclip-hermes-control-plane
  control_plane: Paperclip
  mission: >
    Operate an AI-native software house using Paperclip as the company/control
    plane and Hermes as the agent harness/runtime that runs selected LLM models.
  owner_role: Board / Human Final Authority
  head_employee:
    id: arthur-project-manager
    name: Arthur
    role: Project Manager / Head
    harness: Hermes
    model: GPT-5 mini under Hermes
  corrected_model:
    paperclip: company_control_plane
    arthur: project_manager_head_employee
    hermes: agent_harness_runtime_over_llm_models
    llm_models: reasoning_engines_inside_harness
  operating_rules:
    - one_role_one_module_one_harness
    - paperclip_controls_goals_issues_budgets_heartbeats_audit_approvals
    - hermes_controls_runtime_memory_skills_tools_model_provider_execution
    - retrieve_memory_before_non_trivial_action
    - architecture_before_tickets
    - tests_before_code
    - green_before_next_task
    - green_and_reviewed_before_merge
    - governance_changes_require_human_approval
    - production_trading_keys_forbidden_in_general_agents
    - execution_cannot_invent_trades
    - automated_sizing_fractional_kelly_only
  install_boundary:
    installs_paperclip: false
    installs_hermes: false
    mutates_hermes_internals: false
    mutates_openclaw_internals: false
    stages_paperclip_company_import: true
